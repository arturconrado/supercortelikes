name: clipbr-demo-release

x-release-environment: &release-environment
  NODE_ENV: production
  APP_ENV: release
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
  DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:?DIRECT_DATABASE_URL is required}
  REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET is required}
  CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
  PUBLIC_APP_URL: ${PUBLIC_APP_URL:?PUBLIC_APP_URL is required}
  PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
  S3_ENDPOINT: ${S3_ENDPOINT:?S3_ENDPOINT is required}
  S3_REGION: ${S3_REGION:-auto}
  S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
  S3_FORCE_PATH_STYLE: "false"
  S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
  UPLOAD_MODE: direct
  MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-5368709120}
  UPLOAD_PART_SIZE_BYTES: ${UPLOAD_PART_SIZE_BYTES:-67108864}
  UPLOAD_ALLOWED_MIME_TYPES: video/mp4,video/quicktime,video/webm,video/x-matroska,video/x-msvideo
  QUEUE_PREFIX: clipbr-demo
  MEDIA_WORKER_TOKEN: ${MEDIA_WORKER_TOKEN:?MEDIA_WORKER_TOKEN is required}
  MEDIA_WORKER_INTERNAL_TOKEN: ${MEDIA_WORKER_TOKEN:?MEDIA_WORKER_TOKEN is required}
  MEDIA_WORKER_URL: http://127.0.0.1:8090
  MEDIA_WORKER_DATA_DIR: /data/pipelines
  ENABLE_AI: "true"
  ENABLE_WHISPERX: "true"
  ENABLE_OPENCV: "true"
  ENABLE_MEDIAPIPE: "true"
  ENABLE_YOLO: "true"
  MEDIA_DIARIZATION_ENABLED: "false"
  MEDIA_TRANSCRIPTION_BATCH_SIZE: "1"
  MEDIA_MAX_CONCURRENT_JOBS: "1"
  RETAIN_SOURCE_DOWNLOADS: "false"
  WHISPERX_MODEL: tiny
  WHISPERX_DEVICE: cpu
  WHISPERX_COMPUTE_TYPE: int8
  HF_HOME: /data/models/huggingface
  TORCH_HOME: /data/models/torch
  XDG_CACHE_HOME: /data/models/cache
  MPLCONFIGDIR: /data/models/matplotlib
  YOLO_CONFIG_DIR: /data/models
  LOG_LEVEL: ${LOG_LEVEL:-info}
  BUILD_SHA: ${BUILD_SHA:-local-release}

services:
  migrate:
    build: { context: ., dockerfile: apps/api/Dockerfile, target: migration }
    environment:
      DATABASE_URL: ${DIRECT_DATABASE_URL:?DIRECT_DATABASE_URL is required}

  api:
    build: { context: ., dockerfile: apps/api/Dockerfile, target: runtime }
    environment:
      <<: *release-environment
      PORT: 3001
    ports: ["${PORT:-3001}:3001"]
    depends_on:
      migrate: { condition: service_completed_successfully }
    healthcheck:
      test: [CMD, node, -e, "fetch('http://127.0.0.1:3001/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 18

  worker:
    build: { context: ., dockerfile: infra/render/worker.Dockerfile }
    environment: *release-environment
    volumes: [media_data:/data]
    depends_on:
      migrate: { condition: service_completed_successfully }
    healthcheck:
      test: [CMD, node, apps/api/dist/worker-health.js]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s

volumes:
  media_data:
