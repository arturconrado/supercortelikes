{{- if .Values.mediaWorker.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "clipbr.fullname" . }}-media-worker
  labels:
    {{- include "clipbr.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "clipbr.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: media-worker
  ports:
    - name: http
      port: {{ .Values.mediaWorker.port }}
      targetPort: http
{{- end }}
