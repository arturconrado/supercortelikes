{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "clipbr.fullname" . }}
  labels:
    {{- include "clipbr.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "clipbr.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "clipbr.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.mediaWorker.port }}
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressNamespaceSelector | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressPodSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "clipbr.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.mediaWorker.port }}
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.dnsNamespaceSelector | nindent 14 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- range .Values.networkPolicy.databaseCidrs }}
    - to:
        - ipBlock:
            cidr: {{ . | quote }}
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}
    {{- range .Values.networkPolicy.redisCidrs }}
    - to:
        - ipBlock:
            cidr: {{ . | quote }}
      ports:
        - protocol: TCP
          port: 6379
    {{- end }}
    {{- range .Values.networkPolicy.objectStorageCidrs }}
    - to:
        - ipBlock:
            cidr: {{ . | quote }}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
{{- end }}
