apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - kubernetes/monitoring/namespace.yaml
  - kubernetes/monitoring/workloads.yaml
  - kubernetes/monitoring/services.yaml
  - kubernetes/monitoring/network-policies.yaml
configMapGenerator:
  - name: prometheus-config
    files:
      - prometheus.yml=monitoring/prometheus/prometheus.yml
      - rules.yml=monitoring/prometheus/rules.yml
  - name: otel-collector-config
    files:
      - config.yaml=monitoring/otel-collector/config.yaml
  - name: tempo-config
    files:
      - config.yaml=monitoring/tempo/config.yaml
  - name: grafana-provisioning-datasources
    files:
      - prometheus.yaml=monitoring/grafana/provisioning/datasources/prometheus.yaml
  - name: grafana-provisioning-dashboards
    files:
      - dashboards.yaml=monitoring/grafana/provisioning/dashboards/dashboards.yaml
  - name: grafana-dashboards
    files:
      - api-overview.json=monitoring/grafana/dashboards/api-overview.json
generatorOptions:
  disableNameSuffixHash: false
  labels:
    app.kubernetes.io/part-of: clipbr-observability
