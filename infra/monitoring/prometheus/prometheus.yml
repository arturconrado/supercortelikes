global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: clipbr
    environment: production

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888
          - otel-collector:9464

  - job_name: clipbr-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - clipbr-api.clipbr.svc.cluster.local:80
