name: clipbr-vps

x-api-environment: &api-environment
  NODE_ENV: production
  APP_ENV: production
  PORT: 3001
  DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
  DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
  REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET is required}
  JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
  JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-30}
  PUBLIC_APP_URL: ${PUBLIC_APP_URL:?PUBLIC_APP_URL is required}
  PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
  CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
  CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
  RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
  TERMS_VERSION: ${TERMS_VERSION:-terms-2026-06}
  PRIVACY_VERSION: ${PRIVACY_VERSION:-privacy-2026-06}
  QUEUE_PREFIX: ${QUEUE_PREFIX:-clipbr-vps}
  OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
  OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-20}
  S3_ENDPOINT: http://minio:9000
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:?S3_PUBLIC_ENDPOINT is required}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
  S3_FORCE_PATH_STYLE: "true"
  UPLOAD_MODE: direct
  MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-5368709120}
  UPLOAD_MAX_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-5368709120}
  UPLOAD_PART_SIZE_BYTES: ${UPLOAD_PART_SIZE_BYTES:-67108864}
  UPLOAD_QUEUE_SIZE: ${UPLOAD_QUEUE_SIZE:-2}
  UPLOAD_ALLOWED_MIME_TYPES: video/mp4,video/quicktime,video/webm,video/x-matroska,video/x-msvideo
  MEDIA_WORKER_URL: http://media-worker:8090
  MEDIA_WORKER_TOKEN: ${MEDIA_WORKER_TOKEN:?MEDIA_WORKER_TOKEN is required}
  MEDIA_WORKER_DATA_DIR: /data/pipelines
  MEDIA_WORKER_TIMEOUT_MS: ${MEDIA_WORKER_TIMEOUT_MS:-7200000}
  MEDIA_MAX_CONCURRENT_JOBS: "1"
  AI_REQUIRED: "true"
  ENABLE_AI: "true"
  ENABLE_WHISPERX: "true"
  ENABLE_OPENCV: "true"
  ENABLE_MEDIAPIPE: "true"
  ENABLE_YOLO: "true"
  MEDIA_DIARIZATION_ENABLED: "false"
  MEDIA_TRANSCRIPTION_BATCH_SIZE: "1"
  LLM_PROVIDER: ${LLM_PROVIDER:-none}
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_MODEL: ${LLM_MODEL:-openai/gpt-4o-mini}
  LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-45}
  WHISPERX_MODEL: tiny
  WHISPERX_DEVICE: cpu
  WHISPERX_COMPUTE_TYPE: int8
  HF_HOME: /data/models/huggingface
  TORCH_HOME: /data/models/torch
  XDG_CACHE_HOME: /data/models/cache
  MPLCONFIGDIR: /data/models/matplotlib
  YOLO_CONFIG_DIR: /data/models
  MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN:-}
  MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET:-}
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  EMAIL_FROM: ${EMAIL_FROM:?EMAIL_FROM is required}
  EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED:-true}
  TURNSTILE_REQUIRED: ${TURNSTILE_REQUIRED:-true}
  TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
  TURNSTILE_BYPASS_TOKEN: ${TURNSTILE_BYPASS_TOKEN:-}
  ALLOW_TURNSTILE_BYPASS_IN_PRODUCTION: ${ALLOW_TURNSTILE_BYPASS_IN_PRODUCTION:-false}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_SERVICE_NAME: clipbr-api
  LOG_LEVEL: ${LOG_LEVEL:-info}
  BUILD_SHA: ${BUILD_SHA:-vps-local}

x-worker-environment: &worker-environment
  APP_ENV: production
  REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
  MEDIA_WORKER_DATA_DIR: /data/pipelines
  MEDIA_WORKER_INTERNAL_TOKEN: ${MEDIA_WORKER_TOKEN:?MEDIA_WORKER_TOKEN is required}
  S3_ENDPOINT: http://minio:9000
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
  S3_FORCE_PATH_STYLE: "true"
  MEDIA_DIARIZATION_ENABLED: "false"
  MEDIA_MAX_CONCURRENT_JOBS: "1"
  LLM_PROVIDER: ${LLM_PROVIDER:-none}
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_MODEL: ${LLM_MODEL:-openai/gpt-4o-mini}
  LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-45}
  AI_REQUIRED: "true"
  RETAIN_SOURCE_DOWNLOADS: "false"
  ENABLE_AI: "true"
  ENABLE_WHISPERX: "true"
  ENABLE_OPENCV: "true"
  ENABLE_MEDIAPIPE: "true"
  ENABLE_YOLO: "true"
  WHISPERX_MODEL: tiny
  WHISPERX_DEVICE: cpu
  WHISPERX_COMPUTE_TYPE: int8
  HF_HOME: /data/models/huggingface
  TORCH_HOME: /data/models/torch
  XDG_CACHE_HOME: /data/models/cache
  MPLCONFIGDIR: /data/models/matplotlib
  YOLO_CONFIG_DIR: /data/models
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?APP_DOMAIN is required}
      CADDY_EMAIL: ${CADDY_EMAIL:?CADDY_EMAIL is required}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/caddy/data:/data
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/caddy/config:/config
    depends_on:
      web: { condition: service_healthy }
      api: { condition: service_healthy }
      minio: { condition: service_healthy }

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_LOCAL_PORT:-55432}:5432"
    healthcheck:
      test: [CMD-SHELL, 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: [sh, -ec, 'exec redis-server --appendonly yes --maxmemory-policy noeviction --requirepass "$${REDIS_PASSWORD}"']
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/redis:/data
    healthcheck:
      test: [CMD-SHELL, 'redis-cli --no-auth-warning -a "$${REDIS_PASSWORD}" ping | grep -q PONG']
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      MINIO_BROWSER: "off"
      MINIO_API_CORS_ALLOW_ORIGIN: ${PUBLIC_APP_URL:?PUBLIC_APP_URL is required}
      MINIO_SERVER_URL: ${S3_PUBLIC_ENDPOINT:?S3_PUBLIC_ENDPOINT is required}
    volumes:
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/minio:/data
    healthcheck:
      test: [CMD, curl, --fail, http://localhost:9000/minio/health/live]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    depends_on:
      minio: { condition: service_healthy }
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
      S3_CORS_ALLOWED_ORIGINS_JSON: ${S3_CORS_ALLOWED_ORIGINS_JSON:?S3_CORS_ALLOWED_ORIGINS_JSON is required}
    entrypoint: [sh, -ec]
    command:
      - |
        mc alias set local http://minio:9000 "$${S3_ACCESS_KEY_ID}" "$${S3_SECRET_ACCESS_KEY}"
        mc mb --ignore-existing "local/$${S3_BUCKET}"
        cat > /tmp/cors.json <<EOF
        [
          {
            "AllowedOrigins": $${S3_CORS_ALLOWED_ORIGINS_JSON},
            "AllowedMethods": ["GET", "PUT", "POST", "HEAD"],
            "AllowedHeaders": ["*"],
            "ExposeHeaders": ["ETag"],
            "MaxAgeSeconds": 3000
          }
        ]
        EOF
        mc cors set "local/$${S3_BUCKET}" /tmp/cors.json

  migrate:
    build: { context: ., dockerfile: apps/api/Dockerfile, target: migration }
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
    depends_on:
      postgres: { condition: service_healthy }

  api:
    build: { context: ., dockerfile: apps/api/Dockerfile, target: runtime }
    restart: unless-stopped
    environment: *api-environment
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    healthcheck:
      test: [CMD, node, -e, "fetch('http://127.0.0.1:3001/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:?NEXT_PUBLIC_TURNSTILE_SITE_KEY is required}
        NEXT_PUBLIC_TERMS_VERSION: ${TERMS_VERSION:-terms-2026-06}
        NEXT_PUBLIC_PRIVACY_VERSION: ${PRIVACY_VERSION:-privacy-2026-06}
    restart: unless-stopped
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:?NEXT_PUBLIC_TURNSTILE_SITE_KEY is required}
      NEXT_PUBLIC_TERMS_VERSION: ${TERMS_VERSION:-terms-2026-06}
      NEXT_PUBLIC_PRIVACY_VERSION: ${PRIVACY_VERSION:-privacy-2026-06}
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test: [CMD, node, -e, "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok&&!String(r.status).startsWith('3'))process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  media-worker:
    build: { context: services/media-worker, target: ai }
    restart: unless-stopped
    environment: *worker-environment
    volumes:
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/media:/data
    depends_on:
      redis: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    healthcheck:
      test: [CMD, python, -c, "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health/ready', timeout=8)"]
      interval: 15s
      timeout: 10s
      retries: 24
      start_period: 120s

  worker:
    build: { context: ., dockerfile: apps/api/Dockerfile, target: runtime }
    command: [node, apps/api/dist/worker.js]
    restart: unless-stopped
    environment:
      <<: *api-environment
      OTEL_SERVICE_NAME: clipbr-worker
    volumes:
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/media:/data
    depends_on:
      media-worker: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    healthcheck:
      test: [CMD, node, apps/api/dist/worker-health.js]
      interval: 10s
      timeout: 8s
      retries: 24
      start_period: 30s

  backup:
    profiles: [backup]
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    depends_on:
      minio: { condition: service_healthy }
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
      BACKUP_STAMP: ${BACKUP_STAMP:-manual}
    volumes:
      - ${VPS_BACKUP_DIR:-/srv/clipbr/backups}:/backup
    entrypoint: [sh, -ec]
    command:
      - |
        mkdir -p "/backup/$${BACKUP_STAMP}/minio"
        mc alias set local http://minio:9000 "$${S3_ACCESS_KEY_ID}" "$${S3_SECRET_ACCESS_KEY}"
        mc mirror --overwrite "local/$${S3_BUCKET}" "/backup/$${BACKUP_STAMP}/minio/$${S3_BUCKET}"
