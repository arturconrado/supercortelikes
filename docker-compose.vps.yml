name: clipbr-vps

x-api-environment: &api-environment
  NODE_ENV: production
  APP_ENV: production
  PORT: 3001
  DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
  DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
  REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?REFRESH_TOKEN_SECRET is required}
  JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
  JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-30}
  PUBLIC_APP_URL: ${PUBLIC_APP_URL:?PUBLIC_APP_URL is required}
  PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
  CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
  CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
  RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
  TERMS_VERSION: ${TERMS_VERSION:-terms-2026-06}
  PRIVACY_VERSION: ${PRIVACY_VERSION:-privacy-2026-06}
  QUEUE_PREFIX: ${QUEUE_PREFIX:-clipbr-vps}
  OUTBOX_POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
  OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-50}
  PIPELINE_STAGE_CONCURRENCY_JSON: '${PIPELINE_STAGE_CONCURRENCY_JSON:-{"ingestion":4,"transcription":1,"segmentation":3,"scoring":4,"clips":3,"captions":3,"composition":1,"rendering":1,"exports":3}}'
  PIPELINE_EVENT_RETENTION_SECONDS: ${PIPELINE_EVENT_RETENTION_SECONDS:-300}
  ANALYTICS_CACHE_TTL_SECONDS: ${ANALYTICS_CACHE_TTL_SECONDS:-30}
  S3_ENDPOINT: http://minio:9000
  S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:?S3_PUBLIC_ENDPOINT is required}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
  S3_FORCE_PATH_STYLE: "true"
  UPLOAD_MODE: direct
  MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-5368709120}
  UPLOAD_MAX_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-5368709120}
  UPLOAD_PART_SIZE_BYTES: ${UPLOAD_PART_SIZE_BYTES:-67108864}
  UPLOAD_QUEUE_SIZE: ${UPLOAD_QUEUE_SIZE:-2}
  UPLOAD_ALLOWED_MIME_TYPES: video/mp4,video/quicktime,video/webm,video/x-matroska,video/x-msvideo
  MEDIA_WORKER_URL: http://media-worker:8090
  MEDIA_WORKER_TOKEN: ${MEDIA_WORKER_TOKEN:?MEDIA_WORKER_TOKEN is required}
  MEDIA_WORKER_DATA_DIR: /data/pipelines
  MEDIA_WORKER_TIMEOUT_MS: ${MEDIA_WORKER_TIMEOUT_MS:-7200000}
  MEDIA_MAX_CONCURRENT_JOBS: ${MEDIA_MAX_CONCURRENT_JOBS:-2}
  MEDIA_HEAVY_CONCURRENT_JOBS: ${MEDIA_HEAVY_CONCURRENT_JOBS:-1}
  MEDIA_LIGHT_CONCURRENT_JOBS: ${MEDIA_LIGHT_CONCURRENT_JOBS:-4}
  COMPOSITION_V1_ENABLED: ${COMPOSITION_V1_ENABLED:-false}
  COMPOSITION_V1_ROLLOUT_PERCENT: ${COMPOSITION_V1_ROLLOUT_PERCENT:-100}
  MEDIA_ACCELERATOR: ${MEDIA_ACCELERATOR:-cpu}
  AI_EXECUTION_MODE: ${AI_EXECUTION_MODE:-local}
  STT_PROVIDER: ${STT_PROVIDER:-whisperx}
  DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
  DEEPGRAM_MODEL: ${DEEPGRAM_MODEL:-nova-3}
  DEEPGRAM_LANGUAGE: ${DEEPGRAM_LANGUAGE:-pt-BR}
  DEEPGRAM_TIMEOUT_SECONDS: ${DEEPGRAM_TIMEOUT_SECONDS:-1800}
  DEEPGRAM_COST_USD_PER_HOUR: ${DEEPGRAM_COST_USD_PER_HOUR:-0.35}
  OPENROUTER_EDITOR_MODEL: ${OPENROUTER_EDITOR_MODEL:-google/gemini-2.5-flash}
  OPENROUTER_QA_ENABLED: ${OPENROUTER_QA_ENABLED:-true}
  GPU_PROVIDER: ${GPU_PROVIDER:-none}
  RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
  RUNPOD_ENDPOINT_ID: ${RUNPOD_ENDPOINT_ID:-}
  RUNPOD_TIMEOUT_SECONDS: ${RUNPOD_TIMEOUT_SECONDS:-3600}
  RUNPOD_POLL_SECONDS: ${RUNPOD_POLL_SECONDS:-2}
  RUNPOD_COST_USD_PER_SECOND: ${RUNPOD_COST_USD_PER_SECOND:-0.00019}
  AI_COST_LIMIT_USD_PER_SOURCE_HOUR: ${AI_COST_LIMIT_USD_PER_SOURCE_HOUR:-1.00}
  REMOTE_MAX_CONCURRENCY: ${REMOTE_MAX_CONCURRENCY:-2}
  AUTO_RENDER_MODE: ${AUTO_RENDER_MODE:-off}
  FINAL_MAX_SHORT_SIDE: ${FINAL_MAX_SHORT_SIDE:-1080}
  FFMPEG_PRESET: ${FFMPEG_PRESET:-veryfast}
  FFMPEG_CRF: ${FFMPEG_CRF:-19}
  FFMPEG_THREADS: ${FFMPEG_THREADS:-2}
  FFMPEG_FILTER_THREADS: ${FFMPEG_FILTER_THREADS:-1}
  RENDER_MAX_HEIGHT: ${RENDER_MAX_HEIGHT:-720}
  RENDER_MAX_SOURCE_SHORT_SIDE: ${RENDER_MAX_SOURCE_SHORT_SIDE:-1080}
  ALLOW_FULL_BATCH_RENDER: ${ALLOW_FULL_BATCH_RENDER:-false}
  YTDLP_FRAGMENT_CONCURRENCY: ${YTDLP_FRAGMENT_CONCURRENCY:-4}
  AI_REQUIRED: "true"
  ENABLE_AI: "true"
  ENABLE_WHISPERX: "true"
  ENABLE_OPENCV: "true"
  ENABLE_MEDIAPIPE: "true"
  ENABLE_YOLO: "true"
  MEDIA_DIARIZATION_ENABLED: "false"
  MEDIA_TRANSCRIPTION_BATCH_SIZE: "1"
  LLM_PROVIDER: ${LLM_PROVIDER:-none}
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_MODEL: ${LLM_MODEL:-google/gemini-2.5-flash-lite}
  LLM_PROVIDER_SORT: ${LLM_PROVIDER_SORT:-latency}
  LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-45}
  WHISPERX_MODEL: small
  WHISPERX_DEVICE: cpu
  WHISPERX_COMPUTE_TYPE: int8
  HF_TOKEN: ${HF_TOKEN:-}
  HF_HOME: /data/models/huggingface
  TORCH_HOME: /data/models/torch
  XDG_CACHE_HOME: /data/models/cache
  MPLCONFIGDIR: /data/models/matplotlib
  YOLO_CONFIG_DIR: /data/models
  MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN:-}
  MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET:-}
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  EMAIL_FROM: ${EMAIL_FROM:?EMAIL_FROM is required}
  EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED:-true}
  TURNSTILE_REQUIRED: ${TURNSTILE_REQUIRED:-true}
  TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
  TURNSTILE_BYPASS_TOKEN: ${TURNSTILE_BYPASS_TOKEN:-}
  ALLOW_TURNSTILE_BYPASS_IN_PRODUCTION: ${ALLOW_TURNSTILE_BYPASS_IN_PRODUCTION:-false}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_SERVICE_NAME: clipbr-api
  LOG_LEVEL: ${LOG_LEVEL:-info}
  BUILD_SHA: ${BUILD_SHA:-vps-local}
  OBSERVABILITY_ENABLED: ${OBSERVABILITY_ENABLED:-true}

x-worker-environment: &worker-environment
  APP_ENV: production
  REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
  MEDIA_WORKER_DATA_DIR: /data/pipelines
  MEDIA_WORKER_INTERNAL_TOKEN: ${MEDIA_WORKER_TOKEN:?MEDIA_WORKER_TOKEN is required}
  S3_ENDPOINT: http://minio:9000
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
  S3_FORCE_PATH_STYLE: "true"
  MEDIA_DIARIZATION_ENABLED: "false"
  MEDIA_MAX_CONCURRENT_JOBS: ${MEDIA_MAX_CONCURRENT_JOBS:-2}
  MEDIA_HEAVY_CONCURRENT_JOBS: ${MEDIA_HEAVY_CONCURRENT_JOBS:-1}
  MEDIA_LIGHT_CONCURRENT_JOBS: ${MEDIA_LIGHT_CONCURRENT_JOBS:-4}
  MEDIA_ACCELERATOR: ${MEDIA_ACCELERATOR:-cpu}
  AI_EXECUTION_MODE: ${AI_EXECUTION_MODE:-local}
  STT_PROVIDER: ${STT_PROVIDER:-whisperx}
  DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
  DEEPGRAM_MODEL: ${DEEPGRAM_MODEL:-nova-3}
  DEEPGRAM_LANGUAGE: ${DEEPGRAM_LANGUAGE:-pt-BR}
  DEEPGRAM_TIMEOUT_SECONDS: ${DEEPGRAM_TIMEOUT_SECONDS:-1800}
  DEEPGRAM_COST_USD_PER_HOUR: ${DEEPGRAM_COST_USD_PER_HOUR:-0.35}
  OPENROUTER_EDITOR_MODEL: ${OPENROUTER_EDITOR_MODEL:-google/gemini-2.5-flash}
  OPENROUTER_QA_ENABLED: ${OPENROUTER_QA_ENABLED:-true}
  GPU_PROVIDER: ${GPU_PROVIDER:-none}
  RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
  RUNPOD_ENDPOINT_ID: ${RUNPOD_ENDPOINT_ID:-}
  RUNPOD_TIMEOUT_SECONDS: ${RUNPOD_TIMEOUT_SECONDS:-3600}
  RUNPOD_POLL_SECONDS: ${RUNPOD_POLL_SECONDS:-2}
  RUNPOD_COST_USD_PER_SECOND: ${RUNPOD_COST_USD_PER_SECOND:-0.00019}
  AI_COST_LIMIT_USD_PER_SOURCE_HOUR: ${AI_COST_LIMIT_USD_PER_SOURCE_HOUR:-1.00}
  REMOTE_MAX_CONCURRENCY: ${REMOTE_MAX_CONCURRENCY:-2}
  AUTO_RENDER_MODE: ${AUTO_RENDER_MODE:-off}
  FINAL_MAX_SHORT_SIDE: ${FINAL_MAX_SHORT_SIDE:-1080}
  FFMPEG_PRESET: ${FFMPEG_PRESET:-veryfast}
  FFMPEG_CRF: ${FFMPEG_CRF:-19}
  FFMPEG_THREADS: ${FFMPEG_THREADS:-2}
  FFMPEG_FILTER_THREADS: ${FFMPEG_FILTER_THREADS:-1}
  RENDER_MAX_HEIGHT: ${RENDER_MAX_HEIGHT:-720}
  RENDER_MAX_SOURCE_SHORT_SIDE: ${RENDER_MAX_SOURCE_SHORT_SIDE:-1080}
  ALLOW_FULL_BATCH_RENDER: ${ALLOW_FULL_BATCH_RENDER:-false}
  YTDLP_FRAGMENT_CONCURRENCY: ${YTDLP_FRAGMENT_CONCURRENCY:-4}
  LLM_PROVIDER: ${LLM_PROVIDER:-none}
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_MODEL: ${LLM_MODEL:-google/gemini-2.5-flash-lite}
  LLM_PROVIDER_SORT: ${LLM_PROVIDER_SORT:-latency}
  LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-45}
  YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
  YTDLP_PROXY: ${YTDLP_PROXY:-}
  YTDLP_USER_AGENT: ${YTDLP_USER_AGENT:-}
  AI_REQUIRED: "true"
  RETAIN_SOURCE_DOWNLOADS: "false"
  ENABLE_AI: "true"
  ENABLE_WHISPERX: "true"
  ENABLE_OPENCV: "true"
  ENABLE_MEDIAPIPE: "true"
  ENABLE_YOLO: "true"
  WHISPERX_MODEL: small
  WHISPERX_DEVICE: cpu
  WHISPERX_COMPUTE_TYPE: int8
  HF_HOME: /data/models/huggingface
  TORCH_HOME: /data/models/torch
  XDG_CACHE_HOME: /data/models/cache
  MPLCONFIGDIR: /data/models/matplotlib
  YOLO_CONFIG_DIR: /data/models
  LOG_LEVEL: ${LOG_LEVEL:-info}
  MEDIA_WORKER_METRICS_ENABLED: ${MEDIA_WORKER_METRICS_ENABLED:-true}

services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?APP_DOMAIN is required}
      CADDY_EMAIL: ${CADDY_EMAIL:?CADDY_EMAIL is required}
      GRAFANA_BASIC_AUTH_USER: ${GRAFANA_BASIC_AUTH_USER:?GRAFANA_BASIC_AUTH_USER is required}
      GRAFANA_BASIC_AUTH_PASSWORD_HASH: ${GRAFANA_BASIC_AUTH_PASSWORD_HASH:?GRAFANA_BASIC_AUTH_PASSWORD_HASH is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/caddy/data:/data
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/caddy/config:/config
    depends_on:
      web: { condition: service_healthy }
      api: { condition: service_healthy }
      minio: { condition: service_healthy }
      grafana: { condition: service_started }

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_LOCAL_PORT:-55432}:5432"
    healthcheck:
      test: [CMD-SHELL, 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: [sh, -ec, 'exec redis-server --appendonly yes --maxmemory-policy noeviction --requirepass "$${REDIS_PASSWORD}"']
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/redis:/data
    healthcheck:
      test: [CMD-SHELL, 'redis-cli --no-auth-warning -a "$${REDIS_PASSWORD}" ping | grep -q PONG']
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      MINIO_BROWSER: "off"
      MINIO_API_CORS_ALLOW_ORIGIN: ${PUBLIC_APP_URL:?PUBLIC_APP_URL is required}
      MINIO_SERVER_URL: ${S3_PUBLIC_ENDPOINT:?S3_PUBLIC_ENDPOINT is required}
    volumes:
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/minio:/data
    healthcheck:
      test: [CMD, curl, --fail, http://localhost:9000/minio/health/live]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    depends_on:
      minio: { condition: service_healthy }
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
      S3_CORS_ALLOWED_ORIGINS_JSON: ${S3_CORS_ALLOWED_ORIGINS_JSON:?S3_CORS_ALLOWED_ORIGINS_JSON is required}
    entrypoint: [sh, -ec]
    command:
      - |
        mc alias set local http://minio:9000 "$${S3_ACCESS_KEY_ID}" "$${S3_SECRET_ACCESS_KEY}"
        mc mb --ignore-existing "local/$${S3_BUCKET}"
        cat > /tmp/cors.json <<EOF
        [
          {
            "AllowedOrigins": $${S3_CORS_ALLOWED_ORIGINS_JSON},
            "AllowedMethods": ["GET", "PUT", "POST", "HEAD"],
            "AllowedHeaders": ["*"],
            "ExposeHeaders": ["ETag"],
            "MaxAgeSeconds": 3000
          }
        ]
        EOF
        mc cors set "local/$${S3_BUCKET}" /tmp/cors.json || echo "WARN: bucket CORS configuration failed; relying on MINIO_API_CORS_ALLOW_ORIGIN"

  migrate:
    build: { context: ., dockerfile: apps/api/Dockerfile, target: migration }
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
    depends_on:
      postgres: { condition: service_healthy }

  api:
    build: { context: ., dockerfile: apps/api/Dockerfile, target: runtime }
    restart: unless-stopped
    environment: *api-environment
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    healthcheck:
      test: [CMD, node, -e, "fetch('http://127.0.0.1:3001/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:?NEXT_PUBLIC_TURNSTILE_SITE_KEY is required}
        NEXT_PUBLIC_TERMS_VERSION: ${TERMS_VERSION:-terms-2026-06}
        NEXT_PUBLIC_PRIVACY_VERSION: ${PRIVACY_VERSION:-privacy-2026-06}
    restart: unless-stopped
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:?NEXT_PUBLIC_TURNSTILE_SITE_KEY is required}
      NEXT_PUBLIC_TERMS_VERSION: ${TERMS_VERSION:-terms-2026-06}
      NEXT_PUBLIC_PRIVACY_VERSION: ${PRIVACY_VERSION:-privacy-2026-06}
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test: [CMD, node, -e, "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok&&!String(r.status).startsWith('3'))process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  media-worker:
    build: { context: services/media-worker, target: ai }
    restart: unless-stopped
    environment: *worker-environment
    volumes:
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/media:/data
    depends_on:
      redis: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    healthcheck:
      test: [CMD, python, -c, "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health/ready', timeout=8)"]
      interval: 15s
      timeout: 10s
      retries: 24
      start_period: 120s

  worker:
    build: { context: ., dockerfile: apps/api/Dockerfile, target: runtime }
    command: [node, apps/api/dist/worker.js]
    restart: unless-stopped
    environment:
      <<: *api-environment
      OTEL_SERVICE_NAME: clipbr-worker
    volumes:
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/media:/data
    depends_on:
      media-worker: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    healthcheck:
      test: [CMD, node, apps/api/dist/worker-health.js]
      interval: 10s
      timeout: 8s
      retries: 24
      start_period: 30s

  prometheus:
    image: prom/prometheus:v3.0.1
    restart: unless-stopped
    user: "0"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
    volumes:
      - ./infra/observability/vps/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/vps/rules.yml:/etc/prometheus/rules.yml:ro
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/observability/prometheus:/prometheus
    depends_on:
      api: { condition: service_healthy }
      media-worker: { condition: service_healthy }

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    user: "0"
    environment:
      GF_SERVER_ROOT_URL: ${GRAFANA_PUBLIC_URL:-https://grafana.${APP_DOMAIN:?APP_DOMAIN is required}}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_LOG_MODE: console
    volumes:
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/observability/grafana:/var/lib/grafana
      - ./infra/observability/vps/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/vps/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus: { condition: service_started }
      loki: { condition: service_started }
    healthcheck:
      test: [CMD-SHELL, 'wget -qO- http://127.0.0.1:3000/api/health | grep -q "ok"']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    user: "0"
    command: [-config.file=/etc/loki/loki.yml]
    volumes:
      - ./infra/observability/vps/loki.yml:/etc/loki/loki.yml:ro
      - ${VPS_DATA_DIR:-/srv/clipbr/data}/observability/loki:/loki

  promtail:
    image: grafana/promtail:3.3.2
    restart: unless-stopped
    command: [-config.file=/etc/promtail/promtail.yml]
    volumes:
      - ./infra/observability/vps/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki: { condition: service_started }

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.2
    restart: unless-stopped
    privileged: true
    command:
      - --docker_only=true
      - --store_container_labels=false
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?sslmode=disable
    depends_on:
      postgres: { condition: service_healthy }

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      redis: { condition: service_healthy }

  backup:
    profiles: [backup]
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    depends_on:
      minio: { condition: service_healthy }
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
      BACKUP_STAMP: ${BACKUP_STAMP:-manual}
    volumes:
      - ${VPS_BACKUP_DIR:-/srv/clipbr/backups}:/backup
    entrypoint: [sh, -ec]
    command:
      - |
        mkdir -p "/backup/$${BACKUP_STAMP}/minio"
        mc alias set local http://minio:9000 "$${S3_ACCESS_KEY_ID}" "$${S3_SECRET_ACCESS_KEY}"
        mc mirror --overwrite "local/$${S3_BUCKET}" "/backup/$${BACKUP_STAMP}/minio/$${S3_BUCKET}"
